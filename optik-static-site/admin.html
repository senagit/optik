<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optik Admin Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-10">
        <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
          <div class="card-body p-4 p-lg-5">
            <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
              <div>
                <h1 class="h3 mb-1">Admin Demo Paneli</h1>
                <p class="text-secondary mb-0">Bu panel tarayıcıda localStorage ile çalışır. Demo ve taslak düzenleme içindir.</p>
              </div>
              <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-dark">Kataloğu Aç</a>
                <button id="downloadJson" class="btn btn-dark">JSON İndir</button>
              </div>
            </div>

            <div class="alert alert-warning rounded-4">
              GitHub Pages üzerinde gerçek ortak veri kaydı için backend gerekir. Bu panel aynı cihazda geçici demo yönetimi sağlar.
            </div>

            <form id="productForm" class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Ürün Adı</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Marka</label>
                <input type="text" class="form-control" id="brand" required>
              </div>
              <div class="col-md-3">
                <label class="form-label">Fiyat</label>
                <input type="text" class="form-control" id="price" placeholder="1500 TL" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Kategori</label>
                <select class="form-select" id="category" required>
                  <option value="Güneş Gözlüğü">Güneş Gözlüğü</option>
                  <option value="Optik Çerçeve">Optik Çerçeve</option>
                  <option value="Çocuk">Çocuk</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Hedef Kitle</label>
                <select class="form-select" id="gender" required>
                  <option value="Kadın">Kadın</option>
                  <option value="Erkek">Erkek</option>
                  <option value="Unisex">Unisex</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">Görsel URL</label>
                <input type="url" class="form-control" id="image" placeholder="https://...">
              </div>
              <div class="col-12">
                <button class="btn btn-dark" type="submit">Ürün Ekle</button>
                <button class="btn btn-outline-secondary" type="button" id="clearLocal">Local ürünleri temizle</button>
              </div>
            </form>

            <hr class="my-4">

            <h2 class="h5 mb-3">Tarayıcıda Kayıtlı Ürünler</h2>
            <div class="table-responsive">
              <table class="table align-middle">
                <thead>
                  <tr>
                    <th>Ürün</th>
                    <th>Marka</th>
                    <th>Kategori</th>
                    <th>Fiyat</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="adminTable"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
